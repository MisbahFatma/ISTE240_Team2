<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5" style="max-width:450px;">

    <div class="card p-4 shadow-sm">

        <h2 class="mb-3">Register</h2>

        <input class="form-control mb-2" id="name" placeholder="Name">
        <input class="form-control mb-2" id="email" placeholder="Email">

        <button class="btn btn-success w-100" onclick="register()">Register</button>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="login.html">Login here</a>
        </p>

    </div>
</div>

<script>
    async function register() {

        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value
        };

        const response = await fetch("/api/students", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(student)
        });

        if (response.ok) {
            alert("Registration successful!");
            window.location.href = "login.html";
        } else {
            alert("Registration failed!");
        }
    }
</script>

</body>
</html>
