<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stress Survey - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color:#f6f1e9; }

        .result-box {
            display:none;
            padding:15px;
            margin-top:15px;
            border-radius:10px;
            font-weight:bold;
            text-align:center;
        }

        .low { background:#d4edda; color:#155724; }
        .medium { background:#fff3cd; color:#856404; }
        .high { background:#f8d7da; color:#721c24; }
    </style>
</head>

<body>

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5">

    <h2>Stress Survey</h2>

    <a href="index.html" class="btn btn-secondary mb-3">Back</a>

    <!-- FORM -->
    <div class="card p-4 shadow-sm">

        <input class="form-control mb-2" id="studentId" placeholder="Student ID">

        <label>1. I feel overwhelmed with studies</label>
        <input type="number" min="1" max="5" class="form-control mb-2" id="q1">

        <label>2. I sleep properly</label>
        <input type="number" min="1" max="5" class="form-control mb-2" id="q2">

        <label>3. I feel anxious often</label>
        <input type="number" min="1" max="5" class="form-control mb-2" id="q3">

        <label>4. I can manage deadlines easily</label>
        <input type="number" min="1" max="5" class="form-control mb-2" id="q4">

        <button class="btn btn-success" onclick="calculateSurvey()">Submit Survey</button>

        <div id="resultBox" class="result-box"></div>
    </div>

</div>

<script>
    const apiUrl = "/api/surveys";

    function calculateSurvey() {

        const studentId = document.getElementById("studentId").value;

        const q1 = Number(document.getElementById("q1").value);
        const q2 = Number(document.getElementById("q2").value);
        const q3 = Number(document.getElementById("q3").value);
        const q4 = Number(document.getElementById("q4").value);

        if (!studentId || !q1 || !q2 || !q3 || !q4) {
            alert("Please answer all questions");
            return;
        }

        // 🔥 SCORE CALCULATION
        const total = q1 + q2 + q3 + q4;

        let category = "";
        let className = "";

        if (total <= 8) {
            category = "LOW STRESS 🟢";
            className = "low";
        }
        else if (total <= 14) {
            category = "MEDIUM STRESS 🟡";
            className = "medium";
        }
        else {
            category = "HIGH STRESS 🔴";
            className = "high";
        }

        // SHOW RESULT
        const box = document.getElementById("resultBox");
        box.style.display = "block";
        box.className = "result-box " + className;
        box.innerHTML = `
        Total Score: ${total}<br>
        Result: ${category}
    `;

        // OPTIONAL: SAVE TO BACKEND
        const survey = {
            student: { id: Number(studentId) },
            stressLevel: total,
            date: new Date().toISOString().split("T")[0]
        };

        fetch(apiUrl, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(survey)
        });
    }
</script>

</body>
</html>
