<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stress Survey - MindEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f6f1e9;
        }

        button.emoji-btn {
            font-size: 26px;
            margin: 5px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button.emoji-btn:hover {
            transform: scale(1.3);
        }

        .selected {
            transform: scale(1.4);
            filter: drop-shadow(0 0 3px #333);
        }

        .section {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">🧠 Emoji Stress Survey</h2>

    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <!-- FORM -->
    <div class="card p-4 shadow-sm">

        <input class="form-control mb-3" id="studentId" placeholder="Enter Student ID">

        <!-- QUESTION 1 -->
        <div class="section">
            <p>1. I feel overwhelmed with studies</p>
            <div>
                <button class="emoji-btn" onclick="setAnswer('q1',1,this)">😄</button>
                <button class="emoji-btn" onclick="setAnswer('q1',2,this)">🙂</button>
                <button class="emoji-btn" onclick="setAnswer('q1',3,this)">😐</button>
                <button class="emoji-btn" onclick="setAnswer('q1',4,this)">😟</button>
                <button class="emoji-btn" onclick="setAnswer('q1',5,this)">😫</button>
            </div>
        </div>

        <!-- QUESTION 2 -->
        <div class="section">
            <p>2. I sleep well</p>
            <div>
                <button class="emoji-btn" onclick="setAnswer('q2',1,this)">😄</button>
                <button class="emoji-btn" onclick="setAnswer('q2',2,this)">🙂</button>
                <button class="emoji-btn" onclick="setAnswer('q2',3,this)">😐</button>
                <button class="emoji-btn" onclick="setAnswer('q2',4,this)">😟</button>
                <button class="emoji-btn" onclick="setAnswer('q2',5,this)">😫</button>
            </div>
        </div>

        <!-- QUESTION 3 -->
        <div class="section">
            <p>3. I feel anxious often</p>
            <div>
                <button class="emoji-btn" onclick="setAnswer('q3',1,this)">😄</button>
                <button class="emoji-btn" onclick="setAnswer('q3',2,this)">🙂</button>
                <button class="emoji-btn" onclick="setAnswer('q3',3,this)">😐</button>
                <button class="emoji-btn" onclick="setAnswer('q3',4,this)">😟</button>
                <button class="emoji-btn" onclick="setAnswer('q3',5,this)">😫</button>
            </div>
        </div>

        <!-- QUESTION 4 -->
        <div class="section">
            <p>4. I can manage deadlines</p>
            <div>
                <button class="emoji-btn" onclick="setAnswer('q4',1,this)">😄</button>
                <button class="emoji-btn" onclick="setAnswer('q4',2,this)">🙂</button>
                <button class="emoji-btn" onclick="setAnswer('q4',3,this)">😐</button>
                <button class="emoji-btn" onclick="setAnswer('q4',4,this)">😟</button>
                <button class="emoji-btn" onclick="setAnswer('q4',5,this)">😫</button>
            </div>
        </div>

        <!-- SUBMIT -->
        <button class="btn btn-success w-100 mt-3" onclick="calculateSurvey()">
            Submit Survey
        </button>

        <!-- RESULT -->
        <div id="resultBox" class="mt-4 p-3 text-center fw-bold rounded"></div>

    </div>
</div>

<script>
    let answers = {
        q1: 0,
        q2: 0,
        q3: 0,
        q4: 0
    };

    function setAnswer(question, value, btn) {
        answers[question] = value;

        // highlight selected emoji
        let parent = btn.parentElement;
        let buttons = parent.querySelectorAll("button");

        buttons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
    }

    function calculateSurvey() {

        const studentId = document.getElementById("studentId").value;

        if (!studentId) {
            alert("Please enter Student ID");
            return;
        }

        const total =
            answers.q1 +
            answers.q2 +
            answers.q3 +
            answers.q4;

        let result = "";
        let color = "";

        if (total <= 8) {
            result = "LOW STRESS 🟢";
            color = "#d4edda";
        }
        else if (total <= 14) {
            result = "MEDIUM STRESS 🟡";
            color = "#fff3cd";
        }
        else {
            result = "HIGH STRESS 🔴";
            color = "#f8d7da";
        }

        document.getElementById("resultBox").style.background = color;
        document.getElementById("resultBox").innerHTML =
            `Score: ${total} <br> ${result}`;

        // SAVE TO BACKEND
        fetch("/api/surveys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                student: { id: Number(studentId) },
                stressLevel: total,
                date: new Date().toISOString().split("T")[0]
            })
        });
    }
</script>

</body>
</html>
