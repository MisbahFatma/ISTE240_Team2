<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f6f1e9;">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>Students</h1>
    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Add / Update Student</h4>

        <input type="hidden" id="studentId">
        <input class="form-control mb-2" id="name" placeholder="Name">
        <input class="form-control mb-2" id="email" placeholder="Email">

        <button class="btn btn-success" onclick="saveStudent()">Save</button>
        <button class="btn btn-warning" onclick="clearForm()">Clear</button>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Search</h4>
        <input class="form-control mb-2" id="searchName" placeholder="Search by name">
        <button class="btn btn-primary" onclick="searchStudents()">Search</button>
        <button class="btn btn-secondary" onclick="loadStudents()">Show All</button>
    </div>

    <table class="table table-bordered table-striped bg-white">
        <thead style="background-color:#6b8e6e; color:white;">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    const apiUrl = "/api/students";

    async function loadStudents() {
        const response = await fetch(apiUrl);
        const students = await response.json();
        displayStudents(students);
    }

    function displayStudents(students) {
        const table = document.getElementById("studentTable");
        table.innerHTML = "";

        students.forEach(s => {
            table.innerHTML += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick='editStudent(${JSON.stringify(s)})'>Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveStudent() {
        const id = document.getElementById("studentId").value;

        const student = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value
        };

        if (id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(student)
            });
        } else {
            await fetch(apiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(student)
            });
        }

        clearForm();
        loadStudents();
    }

    function editStudent(s) {
        document.getElementById("studentId").value = s.id;
        document.getElementById("name").value = s.name;
        document.getElementById("email").value = s.email;
    }

    async function deleteStudent(id) {
        await fetch(`${apiUrl}/${id}`, {method: "DELETE"});
        loadStudents();
    }

    async function searchStudents() {
        const name = document.getElementById("searchName").value;
        const response = await fetch(`${apiUrl}/search?name=${name}`);
        const students = await response.json();
        displayStudents(students);
    }

    function clearForm() {
        document.getElementById("studentId").value = "";
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
    }

    loadStudents();
</script>

</body>
</html>
