<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f6f1e9;">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow-sm mx-auto" style="max-width:500px;">
        <h2 class="mb-3">Login</h2>

        <input class="form-control mb-2" id="email" placeholder="Email">
        <input class="form-control mb-3" id="password" type="password" placeholder="Password">

        <button class="btn btn-success w-100" onclick="login()">Login</button>

        <p class="mt-3">No account? <a href="register.html">Register here</a></p>
    </div>
</div>

<script>
    function login() {
        alert("Login demo only. Full authentication can be connected later.");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
