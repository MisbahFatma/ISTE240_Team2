<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5" style="max-width:450px;">

    <div class="card p-4 shadow-sm">

        <h2 class="mb-3">Login</h2>

        <input class="form-control mb-2" id="email" placeholder="Email">

        <button class="btn btn-success w-100" onclick="login()">Login</button>

        <p class="mt-3 text-center">
            Don't have an account?
            <a href="register.html">Register here</a>
        </p>

    </div>
</div>

<script>
    async function login() {

        const email = document.getElementById("email").value;

        const response = await fetch("/api/students");
        const students = await response.json();

        const user = students.find(s => s.email === email);

        if (user) {
            alert("Login successful!");
            window.location.href = "index.html";
        } else {
            alert("User not found!");
        }
    }
</script>

</body>
</html>
