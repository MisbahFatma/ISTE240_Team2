<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resources - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f6f1e9;">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>Resources</h1>
    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Add / Update Resource</h4>

        <input type="hidden" id="resourceId">
        <input class="form-control mb-2" id="title" placeholder="Title">
        <input class="form-control mb-2" id="type" placeholder="Type e.g. Video, Tip, Game">
        <input class="form-control mb-2" id="description" placeholder="Description">
        <input class="form-control mb-2" id="link" placeholder="Link">
        <input class="form-control mb-2" id="stressLevel" placeholder="Stress Level e.g. Low, Medium, High">

        <button class="btn btn-success" onclick="saveResource()">Save</button>
        <button class="btn btn-warning" onclick="clearForm()">Clear</button>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Search</h4>
        <input class="form-control mb-2" id="searchStressLevel" placeholder="Search by stress level">
        <button class="btn btn-primary" onclick="searchResources()">Search</button>
        <button class="btn btn-secondary" onclick="loadResources()">Show All</button>
    </div>

    <table class="table table-bordered table-striped bg-white">
        <thead style="background-color:#6b8e6e; color:white;">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Type</th>
            <th>Description</th>
            <th>Link</th>
            <th>Stress Level</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="resourceTable"></tbody>
    </table>
</div>

<script>
    const apiUrl = "/api/resources";

    async function loadResources() {
        const response = await fetch(apiUrl);
        const resources = await response.json();
        displayResources(resources);
    }

    function displayResources(resources) {
        const table = document.getElementById("resourceTable");
        table.innerHTML = "";

        resources.forEach(r => {
            table.innerHTML += `
                <tr>
                    <td>${r.id}</td>
                    <td>${r.title}</td>
                    <td>${r.type}</td>
                    <td>${r.description}</td>
                    <td><a href="${r.link}" target="_blank">Open</a></td>
                    <td>${r.stressLevel}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick='editResource(${JSON.stringify(r)})'>Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteResource(${r.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveResource() {
        const id = document.getElementById("resourceId").value;

        const resource = {
            title: document.getElementById("title").value,
            type: document.getElementById("type").value,
            description: document.getElementById("description").value,
            link: document.getElementById("link").value,
            stressLevel: document.getElementById("stressLevel").value
        };

        if (id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(resource)
            });
        } else {
            await fetch(apiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(resource)
            });
        }

        clearForm();
        loadResources();
    }

    function editResource(r) {
        document.getElementById("resourceId").value = r.id;
        document.getElementById("title").value = r.title;
        document.getElementById("type").value = r.type;
        document.getElementById("description").value = r.description;
        document.getElementById("link").value = r.link;
        document.getElementById("stressLevel").value = r.stressLevel;
    }

    async function deleteResource(id) {
        await fetch(`${apiUrl}/${id}`, {method: "DELETE"});
        loadResources();
    }

    async function searchResources() {
        const stressLevel = document.getElementById("searchStressLevel").value;
        const response = await fetch(`${apiUrl}/search?stressLevel=${stressLevel}`);
        const resources = await response.json();
        displayResources(resources);
    }

    function clearForm() {
        document.getElementById("resourceId").value = "";
        document.getElementById("title").value = "";
        document.getElementById("type").value = "";
        document.getElementById("description").value = "";
        document.getElementById("link").value = "";
        document.getElementById("stressLevel").value = "";
    }

    loadResources();
</script>

</body>
</html>
