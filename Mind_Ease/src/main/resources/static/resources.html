<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resources - MindEase</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f6f1e9;
        }

        .section-title {
            margin-top: 25px;
            font-weight: bold;
        }

        .card {
            margin-bottom: 10px;
        }

        .low {
            border-left: 6px solid #28a745;
        }

        .medium {
            border-left: 6px solid #ffc107;
        }

        .high {
            border-left: 6px solid #dc3545;
        }
    </style>
</head>

<body>

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center">Stress Resources</h2>

    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <!-- LOW -->
    <div>
        <h4 class="text-success section-title">🟢 Low Stress Resources</h4>
        <div id="low"></div>
    </div>

    <!-- MEDIUM -->
    <div>
        <h4 class="text-warning section-title">🟡 Medium Stress Resources</h4>
        <div id="medium"></div>
    </div>

    <!-- HIGH -->
    <div>
        <h4 class="text-danger section-title">🔴 High Stress Resources</h4>
        <div id="high"></div>
    </div>

</div>

<script>
    const apiUrl = "/api/resources";

    async function loadResources() {
        const res = await fetch(apiUrl);
        const data = await res.json();

        const low = [];
        const medium = [];
        const high = [];

        data.forEach(r => {
            const level = r.stressLevel?.toUpperCase();

            if (level === "LOW") low.push(r);
            else if (level === "MEDIUM") medium.push(r);
            else if (level === "HIGH") high.push(r);
        });

        render(low, "low", "low");
        render(medium, "medium", "medium");
        render(high, "high", "high");
    }

    function render(list, id, cssClass) {
        const container = document.getElementById(id);
        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = "<p class='text-muted'>No resources</p>";
            return;
        }

        list.forEach(r => {
            container.innerHTML += `
                <div class="card p-3 shadow-sm ${cssClass}">
                    <h5>${r.title}</h5>
                    <p>${r.description}</p>
                    <p><b>Type:</b> ${r.type}</p>
                    <a href="${r.link}" target="_blank">Open Resource</a>
                </div>
            `;
        });
    }

    loadResources();
</script>

</body>
</html>
