<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stress Surveys - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f6f1e9;">

<nav class="navbar" style="background-color:#6b8e6e;">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="index.html">MindEase</a>
    </div>
</nav>

<div class="container mt-5">
    <h1>Stress Surveys</h1>
    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Add / Update Survey</h4>

        <input type="hidden" id="surveyId">
        <input class="form-control mb-2" id="studentId" placeholder="Student ID">
        <input class="form-control mb-2" id="stressLevel" placeholder="Stress Level 1-5">
        <input class="form-control mb-2" id="date" placeholder="Date e.g. 2026-04-25">

        <button class="btn btn-success" onclick="saveSurvey()">Save</button>
        <button class="btn btn-warning" onclick="clearForm()">Clear</button>
    </div>

    <div class="card p-3 mb-4 shadow-sm">
        <h4>Search</h4>
        <input class="form-control mb-2" id="searchLevel" placeholder="Search by stress level">
        <button class="btn btn-primary" onclick="searchSurveys()">Search</button>
        <button class="btn btn-secondary" onclick="loadSurveys()">Show All</button>
    </div>

    <table class="table table-bordered table-striped bg-white">
        <thead style="background-color:#6b8e6e; color:white;">
        <tr>
            <th>ID</th>
            <th>Student ID</th>
            <th>Stress Level</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="surveyTable"></tbody>
    </table>
</div>

<script>
    const apiUrl = "/api/surveys";

    async function loadSurveys() {
        const response = await fetch(apiUrl);
        const surveys = await response.json();
        displaySurveys(surveys);
    }

    function displaySurveys(surveys) {
        const table = document.getElementById("surveyTable");
        table.innerHTML = "";

        surveys.forEach(s => {
            table.innerHTML += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.student ? s.student.id : ""}</td>
                    <td>${s.stressLevel}</td>
                    <td>${s.date}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick='editSurvey(${JSON.stringify(s)})'>Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSurvey(${s.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveSurvey() {
        const id = document.getElementById("surveyId").value;

        const survey = {
            student: {
                id: Number(document.getElementById("studentId").value)
            },
            stressLevel: Number(document.getElementById("stressLevel").value),
            date: document.getElementById("date").value
        };

        if (id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(survey)
            });
        } else {
            await fetch(apiUrl, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(survey)
            });
        }

        clearForm();
        loadSurveys();
    }

    function editSurvey(s) {
        document.getElementById("surveyId").value = s.id;
        document.getElementById("studentId").value = s.student ? s.student.id : "";
        document.getElementById("stressLevel").value = s.stressLevel;
        document.getElementById("date").value = s.date;
    }

    async function deleteSurvey(id) {
        await fetch(`${apiUrl}/${id}`, {method: "DELETE"});
        loadSurveys();
    }

    async function searchSurveys() {
        const level = document.getElementById("searchLevel").value;
        const response = await fetch(`${apiUrl}/search?stressLevel=${level}`);
        const surveys = await response.json();
        displaySurveys(surveys);
    }

    function clearForm() {
        document.getElementById("surveyId").value = "";
        document.getElementById("studentId").value = "";
        document.getElementById("stressLevel").value = "";
        document.getElementById("date").value = "";
    }

    loadSurveys();
</script>

</body>
</html>
