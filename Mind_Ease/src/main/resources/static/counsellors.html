<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counsellors - MindEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">Counsellors</h1>

    <a href="index.html" class="btn btn-secondary mb-3">Back to Home</a>

    <div class="card p-3 mb-4">
        <h4>Add / Update Counsellor</h4>

        <input type="hidden" id="counsellorId">

        <input class="form-control mb-2" id="name" placeholder="Name">
        <input class="form-control mb-2" id="email" placeholder="Email">
        <input class="form-control mb-2" id="specialization" placeholder="Specialization">
        <input class="form-control mb-2" id="availability" placeholder="Availability">

        <button class="btn btn-success" onclick="saveCounsellor()">Save</button>
        <button class="btn btn-warning" onclick="clearForm()">Clear</button>
    </div>

    <div class="card p-3 mb-4">
        <h4>Search</h4>
        <input class="form-control mb-2" id="searchSpecialization" placeholder="Search by specialization">
        <button class="btn btn-primary" onclick="searchCounsellors()">Search</button>
        <button class="btn btn-secondary" onclick="loadCounsellors()">Show All</button>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Specialization</th>
            <th>Availability</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="counsellorTable"></tbody>
    </table>
</div>

<script>
    const apiUrl = "/api/counsellors";

    async function loadCounsellors() {
        const response = await fetch(apiUrl);
        const counsellors = await response.json();
        displayCounsellors(counsellors);
    }

    function displayCounsellors(counsellors) {
        const table = document.getElementById("counsellorTable");
        table.innerHTML = "";

        counsellors.forEach(c => {
            table.innerHTML += `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.specialization}</td>
                    <td>${c.availability}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick='editCounsellor(${JSON.stringify(c)})'>Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCounsellor(${c.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    async function saveCounsellor() {
        const id = document.getElementById("counsellorId").value;

        const counsellor = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            specialization: document.getElementById("specialization").value,
            availability: document.getElementById("availability").value
        };

        if (id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(counsellor)
            });
        } else {
            await fetch(apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(counsellor)
            });
        }

        clearForm();
        loadCounsellors();
    }

    function editCounsellor(c) {
        document.getElementById("counsellorId").value = c.id;
        document.getElementById("name").value = c.name;
        document.getElementById("email").value = c.email;
        document.getElementById("specialization").value = c.specialization;
        document.getElementById("availability").value = c.availability;
    }

    async function deleteCounsellor(id) {
        await fetch(`${apiUrl}/${id}`, {
            method: "DELETE"
        });
        loadCounsellors();
    }

    async function searchCounsellors() {
        const specialization = document.getElementById("searchSpecialization").value;
        const response = await fetch(`${apiUrl}/search?specialization=${specialization}`);
        const counsellors = await response.json();
        displayCounsellors(counsellors);
    }

    function clearForm() {
        document.getElementById("counsellorId").value = "";
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("specialization").value = "";
        document.getElementById("availability").value = "";
    }

    loadCounsellors();
</script>

</body>
</html>
